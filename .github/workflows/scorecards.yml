name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "29 4 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  security-events: write
  id-token: write
  contents: read
  actions: read

jobs:
  scorecard:
    uses: septagon-dev/actions/.github/workflows/reusable-scorecards.yml@main
    with:
      artifact-prefix: platformkit-community-openssf-scorecard
      publish-results: true
