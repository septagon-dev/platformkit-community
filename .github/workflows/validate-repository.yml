name: Validate Repository

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          set -euo pipefail
          for path in                     README.md                     REPO_CHARTER.md                     ROADMAP.md                     CONTRIBUTING.md                     SECURITY.md                     SUPPORT.md                     docs/MIGRATION_BOUNDARY.md                     CODEOWNERS                     LICENSE; do
            test -f "$path"
          done
